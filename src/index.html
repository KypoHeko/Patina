<!DOCTYPE html>
<html lang="ru" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patina</title>
    <link rel="stylesheet" href="styles/tokens.css" />
    <link rel="stylesheet" href="styles/base.css" />
    <link rel="stylesheet" href="styles/layout.css" />
    <link rel="stylesheet" href="styles/components/sidebar.css" />
    <link rel="stylesheet" href="styles/components/tab-bar.css" />
    <link rel="stylesheet" href="styles/components/file-panel.css" />
    <link rel="stylesheet" href="styles/components/context-menu.css" />
    <link rel="stylesheet" href="styles/components/command-palette.css" />
    <link rel="stylesheet" href="styles/components/duplicate-panel.css" />
    <link rel="stylesheet" href="styles/components/relationship-graph.css" />
    <link rel="stylesheet" href="styles/components/confirm-dialog.css" />
    <link rel="stylesheet" href="styles/components/preview-panel.css" />
    <link rel="stylesheet" href="styles/components/theme-menu.css" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand">
          <span class="brand__mark"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.84Z"/><path d="M2 12a1 1 0 0 0 .58.91l8.6 3.91a2 2 0 0 0 1.65 0l8.58-3.9A1 1 0 0 0 22 12"/><path d="M2 17a1 1 0 0 0 .58.91l8.6 3.91a2 2 0 0 0 1.65 0l8.58-3.9A1 1 0 0 0 22 17"/></svg></span>
          <span class="brand__name">Patina</span>
        </div>
        <input id="topbar-search" class="topbar-search" type="text" spellcheck="false"
          placeholder="Поиск… (текст или regex)" title="Фильтр активной панели: текст или регулярное выражение" />
        <div class="topbar__spacer"></div>
        <button class="icon-btn" id="dirsize-btn" title="Посчитать размеры папок"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><text x="4" y="18" font-size="16" fill="currentColor" stroke="none" font-weight="bold">∑</text></svg></button>
        <button class="icon-btn" id="preview-btn" title="Превью выбранного файла"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg></button>
        <button class="icon-btn" id="collapse-sidebar-btn" title="Свернуть боковую панель"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 3v18"/><path d="m16 15-3-3 3-3"/></svg></button>
        <button class="icon-btn" id="duplicates-btn" title="Найти дубликаты"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg></button>
        <button class="icon-btn" id="graph-btn" title="Связи между файлами"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/></svg></button>
        <button class="icon-btn" id="theme-btn" title="Палитра"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 0 0 20z" fill="currentColor" stroke="none"/></svg></button>
        <button class="icon-btn is-on" id="tabcolors-btn" title="Цветовая индикация вкладок"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2Z"/></svg></button>
        <button class="icon-btn lang-btn" id="lang-btn" title="Язык интерфейса">RU</button>
      </header>

      <aside class="sidebar" id="sidebar"></aside>

      <div class="main">
        <nav class="tab-bar" id="tab-bar"></nav>
        <main class="workspace">
          <section class="pane" id="pane-left"></section>
          <div class="pane-divider" id="divider"></div>
          <section class="pane" id="pane-right"></section>
        </main>
        <footer class="statusbar" id="statusbar"></footer>
        <aside class="main__dock main__dock--dup" id="duplicate-root"></aside>
        <aside class="main__dock" id="preview-root"></aside>
      </div>
    </div>

    <div id="context-menu-root"></div>
    <div id="palette-root"></div>
    <div id="graph-root"></div>
    <div id="confirm-root"></div>
    <div id="theme-root"></div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
